<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urbanization, City Population, and Life Expectancy in Turkey</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
}

.tooltip{
  position:absolute;
  background:white;
  padding:6px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:12px;
  pointer-events:none;
}
</style>
</head>

<body>

<h1 style="color:#000000">
Urbanization, City Population, and Life Expectancy in Turkey (1927–2020)
</h1>

<svg id="datavis_svg" width="1000" height="600"></svg>

<script>

const data = [

{city:"Istanbul",year:1927,urbanization:24,population:0.8,lifeExp:40},
{city:"Istanbul",year:1940,urbanization:24,population:0.9,lifeExp:41},
{city:"Istanbul",year:1950,urbanization:25,population:1.0,lifeExp:43},
{city:"Istanbul",year:1960,urbanization:32,population:1.5,lifeExp:50},
{city:"Istanbul",year:1970,urbanization:38,population:2.1,lifeExp:55},
{city:"Istanbul",year:1980,urbanization:44,population:4.7,lifeExp:58},
{city:"Istanbul",year:2000,urbanization:65,population:8.8,lifeExp:71},
{city:"Istanbul",year:2020,urbanization:76,population:15.5,lifeExp:78},

{city:"Ankara",year:1927,urbanization:24,population:0.07,lifeExp:40},
{city:"Ankara",year:1940,urbanization:24,population:0.15,lifeExp:41},
{city:"Ankara",year:1950,urbanization:25,population:0.28,lifeExp:43},
{city:"Ankara",year:1960,urbanization:32,population:0.65,lifeExp:50},
{city:"Ankara",year:1970,urbanization:38,population:1.2,lifeExp:55},
{city:"Ankara",year:1980,urbanization:44,population:2.8,lifeExp:58},
{city:"Ankara",year:2000,urbanization:65,population:3.8,lifeExp:71},
{city:"Ankara",year:2020,urbanization:76,population:5.7,lifeExp:78},

{city:"Adana",year:1927,urbanization:24,population:0.07,lifeExp:40},
{city:"Adana",year:1940,urbanization:24,population:0.1,lifeExp:41},
{city:"Adana",year:1950,urbanization:25,population:0.15,lifeExp:43},
{city:"Adana",year:1960,urbanization:32,population:0.25,lifeExp:50},
{city:"Adana",year:1970,urbanization:38,population:0.45,lifeExp:55},
{city:"Adana",year:1980,urbanization:44,population:0.78,lifeExp:58},
{city:"Adana",year:2000,urbanization:65,population:1.1,lifeExp:71},
{city:"Adana",year:2020,urbanization:76,population:2.3,lifeExp:78},

{city:"Van",year:1927,urbanization:24,population:0.02,lifeExp:40},
{city:"Van",year:1940,urbanization:24,population:0.03,lifeExp:41},
{city:"Van",year:1950,urbanization:25,population:0.05,lifeExp:43},
{city:"Van",year:1960,urbanization:32,population:0.08,lifeExp:50},
{city:"Van",year:1970,urbanization:38,population:0.12,lifeExp:55},
{city:"Van",year:1980,urbanization:44,population:0.2,lifeExp:58},
{city:"Van",year:2000,urbanization:65,population:0.5,lifeExp:71},
{city:"Van",year:2020,urbanization:76,population:1.1,lifeExp:78}

];

const margin = {top:40,right:40,bottom:60,left:80};
const width = 700;
const height = 500;

const svg = d3.select("#datavis_svg");

const chart = svg.append("g")
.attr("transform",`translate(${margin.left},${margin.top})`);

const tooltip = d3.select("body")
.append("div")
.attr("class","tooltip")
.style("display","none");

const x = d3.scaleLinear()
.domain([20,80])
.range([0,width]);

const y = d3.scaleLinear()
.domain([0,18])
.range([height,0]);

const color = d3.scaleOrdinal()
.domain(["Istanbul","Ankara","Adana","Van"])
.range(["pink","lightblue","blue","black"]);

const size = d3.scaleSqrt()
.domain(d3.extent(data,d=>d.lifeExp))
.range([4,16]);

chart.append("g")
.attr("transform",`translate(0,${height})`)
.call(d3.axisBottom(x));

chart.append("g")
.call(d3.axisLeft(y));

chart.append("rect")
.attr("width",width)
.attr("height",height)
.attr("fill","none")
.attr("stroke","#ccc");

chart.selectAll("circle.data-point")
.data(data)
.enter()
.append("circle")
.attr("class","data-point")
.attr("cx",d=>x(d.urbanization))
.attr("cy",d=>y(d.population)-size(d.lifeExp)/2)
.attr("r",d=>size(d.lifeExp))
.attr("fill",d=>color(d.city))
.attr("opacity",0.75)
.attr("stroke","white")
.attr("stroke-width",0.5)

.on("mouseover",(event,d)=>{
tooltip
.style("display","block")
.html(
`City: ${d.city}<br>
Year: ${d.year}<br>
Population: ${d.population} M<br>
Life Expectancy: ${d.lifeExp}`
);
})

.on("mousemove",event=>{
tooltip
.style("left",(event.pageX+10)+"px")
.style("top",(event.pageY-20)+"px");
})

.on("mouseout",()=>{
tooltip.style("display","none");
});

chart.append("text")
.attr("x",width/2)
.attr("y",height+40)
.attr("text-anchor","middle")
.text("Urbanization Rate (%)");

chart.append("text")
.attr("transform","rotate(-90)")
.attr("x",-height/2)
.attr("y",-50)
.attr("text-anchor","middle")
.text("City Population (millions)");

const cityLegend = svg.append("g")
.attr("transform","translate(830,100)");

cityLegend.append("text")
.text("Cities")
.style("font-weight","bold")
.attr("y",-25);

const cities = ["Istanbul","Ankara","Adana","Van"];

cities.forEach((city,i)=>{

const row = cityLegend.append("g")
.attr("transform",`translate(0,${i*35})`);

row.append("circle")
.attr("r",7)
.attr("fill",color(city));

row.append("text")
.attr("x",18)
.attr("y",5)
.text(city);

});


const sizeLegend = svg.append("g")
.attr("transform","translate(830,300)");

sizeLegend.append("text")
.text("Life Expectancy")
.style("font-weight","bold")
.attr("y",-25);

const levels = [
{label:"< 50",value:45},
{label:"50 – 65",value:58},
{label:"65 – 80",value:72}
];

levels.forEach((d,i)=>{

const row = sizeLegend.append("g")
.attr("transform",`translate(0,${i*50})`);

row.append("circle")
.attr("r",size(d.value))
.attr("fill","gray")
.attr("opacity",0.6);

row.append("text")
.attr("x",35)
.attr("y",5)
.text(d.label);

});

</script>

</body>
</html>
